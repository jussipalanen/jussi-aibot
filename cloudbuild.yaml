steps:
  # Build with Kaniko (better layer caching, faster, cheaper)
  - name: 'gcr.io/kaniko-project/executor:latest'
    args:
      - '--destination=europe-north1-docker.pkg.dev/$PROJECT_ID/jussi-aibot/jussi-aibot:$COMMIT_SHA'
      - '--destination=europe-north1-docker.pkg.dev/$PROJECT_ID/jussi-aibot/jussi-aibot:latest'
      - '--build-arg=INCLUDE_ML_DEPS=${_INCLUDE_ML_DEPS}'
      - '--cache=true'
      - '--cache-ttl=168h'  # Cache for 7 days
      - '--compressed-caching=false'  # Faster cache writes
      - '--snapshot-mode=redo'  # Faster layer detection
      - '--use-new-run=true'  # Better RUN caching
    id: 'build-and-push-image'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'jussi-aibot-production'
      - '--image=europe-north1-docker.pkg.dev/$PROJECT_ID/jussi-aibot/jussi-aibot:$COMMIT_SHA'
      - '--region=europe-north1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=300s'
      - '--min-instances=0'
      - '--max-instances=1'
      - '--port=8080'
      - '--set-env-vars=DAILY_RATE_LIMIT=50/day,DEFAULT_PROVIDER=puter_ai,DISABLE_LOCAL_MODEL=true,API_KEY_HASHES=,PUTER_MODEL=gpt-4o-mini,PUTER_DRIVER=openai-completion,PUTER_PROMPT_MAX_CHARS=6000'
      - '--set-secrets=API_KEYS=API_KEYS:latest,PUTER_API_KEY=PUTER_API_KEY:latest'
    id: 'deploy-cloud-run'

# Build configuration - optimized for cost
options:
  machineType: 'E2_MEDIUM'  # Cheaper builds, slower but low-cost
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _INCLUDE_ML_DEPS: '0'

timeout: '1800s'

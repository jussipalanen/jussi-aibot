steps:
  # Build with Kaniko (better layer caching, faster, cheaper)
  - name: 'gcr.io/kaniko-project/executor:latest'
    args:
      - '--destination=europe-north1-docker.pkg.dev/$PROJECT_ID/jussi-aibot/jussi-aibot:$COMMIT_SHA'
      - '--destination=europe-north1-docker.pkg.dev/$PROJECT_ID/jussi-aibot/jussi-aibot:latest'
      - '--build-arg=INCLUDE_ML_DEPS=${_INCLUDE_ML_DEPS}'
      - '--cache=true'
      - '--cache-ttl=168h'  # Cache for 7 days
      - '--compressed-caching=false'  # Faster cache writes
      - '--snapshot-mode=redo'  # Faster layer detection
      - '--use-new-run=true'  # Better RUN caching
    id: 'build-and-push-image'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'jussi-aibot-production'
      - '--image=europe-north1-docker.pkg.dev/$PROJECT_ID/jussi-aibot/jussi-aibot:$COMMIT_SHA'
      - '--region=europe-north1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=300s'
      - '--min-instances=0'
      - '--max-instances=1'
      - '--port=8080'
      - '--cpu-boost'
      - '--no-cpu-throttling'
      - >-
        --set-env-vars=^::^DAILY_RATE_LIMIT=${_DAILY_RATE_LIMIT}::DEFAULT_PROVIDER=${_DEFAULT_PROVIDER}::DISABLE_LOCAL_MODEL=true::API_KEY_HASHES=::PUTER_MODEL=gpt-4o-mini::PUTER_DRIVER=openai-completion::PUTER_PROMPT_MAX_CHARS=6000::GCP_PROJECT=$PROJECT_ID::GCP_LOCATION=${_GCP_LOCATION}::VERTEX_MODEL=${_VERTEX_MODEL}::AGENT_VERTEX_MODEL=${_AGENT_VERTEX_MODEL}::AGENT_GCP_LOCATION=${_AGENT_GCP_LOCATION}::JUSSISPACE_VERTEX_MODEL=${_JUSSISPACE_VERTEX_MODEL}::JUSSIMATIC_CV_VERTEX_MODEL=${_JUSSIMATIC_CV_VERTEX_MODEL}::JUSSISPACE_API_URL=${_JUSSISPACE_API_URL}::JUSSIMATIC_CV_API_URL=${_JUSSIMATIC_CV_API_URL}::JUSSILOG_STORAGE_BASE_URL=${_JUSSILOG_STORAGE_BASE_URL}::ALLOWED_ORIGINS=${_ALLOWED_ORIGINS}
      - '--set-secrets=API_KEYS=JUSSI_AIBOT_API_KEYS:latest,PUTER_API_KEY=JUSSI_AIBOT_PUTER_API_KEY:latest,AGENT_EMAIL=JUSSI_AIBOT_AGENT_EMAIL:latest,AGENT_PASSWORD=JUSSI_AIBOT_AGENT_PASSWORD:latest,AI_SECRET_KEY=JUSSI_AIBOT_AI_SECRET_KEY:latest'
    id: 'deploy-cloud-run'

# Build configuration - optimized for cost
options:
  machineType: 'E2_MEDIUM'  # Cheaper builds, slower but low-cost
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _INCLUDE_ML_DEPS: '0'
  # Deployment config — override at trigger level or via --substitutions flag
  _DAILY_RATE_LIMIT: '50/day'
  _DEFAULT_PROVIDER: vertex_ai
  _GCP_LOCATION: europe-north1
  _VERTEX_MODEL: gemini-2.5-flash-lite
  _AGENT_VERTEX_MODEL: gemini-2.5-flash-lite
  _AGENT_GCP_LOCATION: europe-north1
  _JUSSISPACE_VERTEX_MODEL: ''
  _JUSSIMATIC_CV_VERTEX_MODEL: ''
  _JUSSISPACE_API_URL: 'https://backend-lab-jussispace.jussialanen.com/api'
  _JUSSIMATIC_CV_API_URL: ''
  _JUSSILOG_STORAGE_BASE_URL: 'https://jussilog-backend-uploads.storage.googleapis.com'
  # Set to your production frontend domains, e.g.:
  # _ALLOWED_ORIGINS: 'https://jussimatic.com,https://jussispace.com'
  _ALLOWED_ORIGINS: ''

timeout: '1800s'

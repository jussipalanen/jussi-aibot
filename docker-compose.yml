services:
  api:
    build: .
    container_name: jussi-aibot-api
    ports:
      - "8080:8080"
    environment:
      PORT: ${PORT:-8080}
      HF_HOME: ${HF_HOME:-/opt/hf-cache}
      DAILY_RATE_LIMIT: ${DAILY_RATE_LIMIT:-50/day}
      API_KEYS: ${API_KEYS:-}
      API_KEY_HASHES: ${API_KEY_HASHES:-}
      PUTER_API_KEY: ${PUTER_API_KEY:-}
      PUTER_MODEL: ${PUTER_MODEL:-gpt-4o-mini}
      PUTER_DRIVER: ${PUTER_DRIVER:-openai-completion}
      PUTER_PROMPT_MAX_CHARS: ${PUTER_PROMPT_MAX_CHARS:-6000}
    volumes:
      - .:/app
      - hf_cache:/opt/hf-cache
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8080 --reload

volumes:
  hf_cache:

name: PR Checks

on:
  pull_request:
    branches: [main, dev-*]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write  # for uploading SARIF results
  actions: read           # required by codeql-action/upload-sarif on PRs

jobs:
  # ── 1. Dependency vulnerability audit ─────────────────────────────────────
  audit:
    name: Dependency Audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit core dependencies
        run: pip-audit -r requirements.txt

      - name: Audit ML dependencies
        run: pip-audit -r requirements-ml.txt

  # ── 2. Python static security analysis ────────────────────────────────────
  bandit:
    name: SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit[sarif]

      - name: Run bandit
        run: |
          bandit -r . \
            --exclude ./venv,./tests \
            --format sarif \
            --output bandit-results.sarif \
            --severity-level medium \
            --confidence-level medium || true

      - name: Upload bandit SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit-results.sarif
          category: bandit

  # ── 3. Docker image vulnerability scan ────────────────────────────────────
  trivy:
    name: Container Scan (trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build -t jussi-aibot:scan .

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: jussi-aibot:scan
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  # ── 4. Python tests ────────────────────────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install antiword (required by services.py)
        run: sudo apt-get install -y antiword

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx

      - name: Run tests
        run: pytest tests/ -v --tb=short --ignore=tests/test_origin_access.sh --ignore=tests/verify_origin_security.sh
